<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog — Siddharth Shrimal</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="../index.html" class="site-logo">Siddharth Shrimal</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="../cv.html">CV</a></li>
        <li><a href="../blogs.html">Blog</a></li>
        <li class="nav-dropdown">
          <a href="#" class="nav-dropdown-toggle">Projects</a>
          <ul class="nav-dropdown-menu">
            <li><a href="../projectspage.html">Research Projects</a></li>
            <li><a href="../nonresearchprojpage.html">Non-Research Projects</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <a class="back-link" href="../blogs.html">&larr; All posts</a>

    <div class="blog-post-header">
      <h1 id="blog-title">Loading…</h1>
      <p class="blog-meta" id="blog-date"></p>
    </div>

    <div class="blog-content" id="blog-content">
      <p>Loading…</p>
    </div>
  </main>

  <footer>&copy; 2025 Siddharth Shrimal</footer>

  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var links  = document.getElementById('nav-links');
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
      document.querySelectorAll('.nav-dropdown-toggle').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          if (window.innerWidth <= 640) {
            e.preventDefault();
            btn.closest('.nav-dropdown').classList.toggle('open');
          }
        });
      });
      document.addEventListener('click', function (e) {
        if (!e.target.closest('.site-nav')) {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();

    async function loadBlog() {
      var el = document.getElementById('blog-content');
      try {
        var res = await fetch('../blogs/blog2.txt');
        if (!res.ok) throw new Error('Could not load blog content');
        var text = await res.text();
        var lines = text.split('\n');
        // First line is the title
        document.getElementById('blog-title').textContent = lines[0] || 'Post';
        document.title = (lines[0] || 'Blog') + ' — Siddharth Shrimal';
        var body = lines.slice(1).join('\n');
        var paragraphs = body
          .split(/\n{2,}/)
          .map(function (p) { return p.trim(); })
          .filter(Boolean)
          .map(function (p) { return '<p>' + p.replace(/\n/g, ' ') + '</p>'; });
        el.innerHTML = paragraphs.join('\n');
      } catch (err) {
        el.innerHTML = '<p>Content coming soon.</p>';
        document.getElementById('blog-title').textContent = 'Coming Soon';
        document.title = 'Blog — Siddharth Shrimal';
      }
    }

    loadBlog();
  </script>

</body>
</html>
