<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Blog posts by Siddharth Shrimal." />
  <title>Blog — Siddharth Shrimal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <a href="index.html" class="site-logo">Siddharth Shrimal</a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="cv.html">CV</a></li>
        <li><a href="blogs.html">Blog</a></li>
        <li class="nav-dropdown">
          <a href="#" class="nav-dropdown-toggle">Projects</a>
          <ul class="nav-dropdown-menu">
            <li><a href="projectspage.html">Research Projects</a></li>
            <li><a href="nonresearchprojpage.html">Non-Research Projects</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </header>

  <main class="page">
    <h1>Blog</h1>
    <div id="blogs-container">
      <!-- Posts loaded dynamically -->
    </div>
    <p style="color: var(--muted); font-size: 0.9rem; margin-top: 8px;">
      More posts coming soon.
    </p>
  </main>

  <footer>&copy; 2025 Siddharth Shrimal</footer>

  <script>
    (function () {
      // Nav
      var toggle = document.querySelector('.nav-toggle');
      var links  = document.getElementById('nav-links');
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
      });
      document.querySelectorAll('.nav-dropdown-toggle').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          if (window.innerWidth <= 640) {
            e.preventDefault();
            btn.closest('.nav-dropdown').classList.toggle('open');
          }
        });
      });
      document.addEventListener('click', function (e) {
        if (!e.target.closest('.site-nav')) {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();

    // Blog posts metadata
    var blogs = [
      {
        title: "Why I Hate LinkedIn",
        file:  "blogs/blog1.txt",
        page:  "blog_subpages/blog1.html",
        date:  "January 11, 2025"
      }
    ];

    function truncateWords(text, limit) {
      var words = text.trim().split(/\s+/);
      return words.length > limit
        ? words.slice(0, limit).join(' ') + '…'
        : text;
    }

    async function loadBlogs() {
      var container = document.getElementById('blogs-container');
      for (var i = 0; i < blogs.length; i++) {
        var blog = blogs[i];
        try {
          var res = await fetch(blog.file);
          if (!res.ok) throw new Error('Could not load ' + blog.file);
          var text = await res.text();
          var preview = truncateWords(text, 80);

          var el = document.createElement('div');
          el.className = 'blog-entry';
          el.innerHTML =
            '<p class="blog-meta">' + blog.date + '</p>' +
            '<h2><a href="' + blog.page + '">' + blog.title + '</a></h2>' +
            '<p>' + preview + '</p>' +
            '<a class="read-more" href="' + blog.page + '">Read more &rarr;</a>';
          container.appendChild(el);
        } catch (err) {
          console.error(err);
        }
      }
    }

    loadBlogs();
  </script>

</body>
</html>
